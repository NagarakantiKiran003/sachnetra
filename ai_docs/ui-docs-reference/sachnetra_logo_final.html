<style>

  100% { width: 100%; }

</style>

<script>
const now = new Date();
const h = now.getHours();
const greetings = {
  morning: 'Here\'s India<br>this morning.',
  afternoon: 'Here\'s India<br>right now.',
  evening: 'Here\'s India<br>this evening.',
  night: 'Here\'s India<br>tonight.'
};
const key = h >= 5 && h < 11 ? 'morning' : h >= 11 && h < 17 ? 'afternoon' : h >= 17 && h < 22 ? 'evening' : 'night';
const dateStr = now.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
const el = document.getElementById('ls-greeting');
const dateEl = document.getElementById('ls-date');
if (el) el.innerHTML = greetings[key];
if (dateEl) dateEl.textContent = dateStr;
</script>
